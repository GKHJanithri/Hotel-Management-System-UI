<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Staff Management | Hotel Management System</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />

<!-- Shared component + dashboard styles (already in your project) -->
<link rel="stylesheet" href="styles/components.css" />
<link rel="stylesheet" href="styles/dashboard.css" />
<!-- New styles just for this page -->
<link rel="stylesheet" href="styles/staff_manage.css" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body data-page="staff" data-title="Staff Management" data-sub="Manage employees, roles, shifts and attendances.">

  <div class="app">

    <!-- Sidebar gets injected here by components.js -->
    <div id="sidebar-placeholder"></div>

    <div class="main">

      <!-- Topbar gets injected here by components.js -->
      <div id="topbar-placeholder"></div>

      <main class="page-body">

        <!-- Page header -->
        <div class="page-header">
          <div>
           <!-- <h1>Staff Management</h1>
            <p class="page-subtitle">Manage employees, roles, shifts and attendances.</p>-->
          </div>
        </div>

        <!-- Stat cards -->
        <section class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon icon-blue">👥</div>
            <div class="stat-info">
              <span class="stat-label">Total Staff</span>
              <span class="stat-value" id="statTotalStaff">84</span>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon icon-green">🟢</div>
            <div class="stat-info">
              <span class="stat-label">On Duty Today</span>
              <span class="stat-value" id="statOnDuty">66</span>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon icon-orange">📤</div>
            <div class="stat-info">
              <span class="stat-label">On Leave</span>
              <span class="stat-value" id="statOnLeave">5</span>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon icon-purple">🗂</div>
            <div class="stat-info">
              <span class="stat-label">Departments</span>
              <span class="stat-value" id="statDepartments">8</span>
            </div>
          </div>
        </section>

        <!-- Toolbar -->
        <section class="staff-toolbar">
          <select id="departmentFilter" class="filter-select">
            <option value="all">All Departments</option>
            <option value="Front Desk">Front Desk</option>
            <option value="Kitchen">Kitchen</option>
            <option value="Housekeeping">Housekeeping</option>
            <option value="F&B Service">F&amp;B Service</option>
            <option value="Maintenance">Maintenance</option>
          </select>

          <select id="statusFilter" class="filter-select">
            <option value="all">All Status</option>
            <option value="On Duty">On Duty</option>
            <option value="On Leave">On Leave</option>
          </select>

          <select id="shiftFilter" class="filter-select">
            <option value="all">All Shifts</option>
            <option value="Morning">Morning</option>
            <option value="Evening">Evening</option>
            <option value="Night">Night</option>
            <option value="Full Day">Full Day</option>
          </select>

          <button class="add-task-btn" id="addTaskBtn">+ Add Task</button>
        </section>

        <!-- Main two column layout -->
        <div class="staff-layout">

          <!-- Employee table -->
          <section class="table-card">
            <div class="table-scroll">
              <table class="staff-table">
                <thead>
                  <tr>
                    <th>Employee</th>
                    <th>Department</th>
                    <th>Shift</th>
                    <th>Contact</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="staffTableBody"><!-- Rendered by js/staff-management.js --></tbody>
              </table>
            </div>

            <div class="table-footer">
              <span id="paginationSummary">Showing 1 to 8 employees</span>
              <div class="pagination">
                <button class="page-nav" id="prevPage">&lt;</button>
                <button class="page-number active">1</button>
                <button class="page-nav" id="nextPage">&gt;</button>
              </div>
            </div>
          </section>

          <!-- Right column: Departments + Today's Shift -->
          <div class="side-column">

            <section class="side-card">
              <div class="side-card-header">
                <h2 class="side-card-title">Departments</h2>
                <a href="#" class="view-all-link">View All</a>
              </div>
              <div id="departmentsList"><!-- Rendered by js/staff-management.js --></div>
            </section>

            <section class="side-card">
              <div class="side-card-header">
                <h2 class="side-card-title">Today's Shift</h2>
                <a href="#" class="view-all-link">View All</a>
              </div>
              <div id="todaysShiftList"><!-- Rendered by js/staff-management.js --></div>
            </section>

          </div>

        </div>

        <!-- Assigned Tasks -->
        <section class="table-card tasks-card">
          <div class="side-card-header">
            <h2 class="table-title">Assigned Tasks</h2>
            <span class="tasks-count" id="tasksCount">0 tasks</span>
          </div>

          <div class="table-scroll">
            <table class="tasks-table">
              <thead>
                <tr>
                  <th>Task</th>
                  <th>Assigned To</th>
                  <th>Department</th>
                  <th>Due Date</th>
                  <th>Priority</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tasksTableBody"><!-- Rendered by js/staff-management.js --></tbody>
            </table>
          </div>
        </section>

      </main>

      <!-- Footer gets injected here by components.js -->
      <div id="footer-placeholder"></div>

    </div>
  </div>

  <!-- Add Task Modal -->
  <div class="modal-overlay" id="addTaskOverlay">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Add Task</h2>
        <button class="modal-close" id="closeModalBtn">✕</button>
      </div>

      <form id="addTaskForm">
        <div class="form-group">
          <label for="taskTitle">Task Title <span class="required">*</span></label>
          <input type="text" id="taskTitle" placeholder="e.g. Restock minibar in Room 204" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskAssignee">Assign To <span class="required">*</span></label>
            <select id="taskAssignee" required>
              <option value="" disabled selected>Select employee</option>
            </select>
          </div>

          <div class="form-group">
            <label for="taskDepartment">Department</label>
            <select id="taskDepartment">
              <option value="Front Desk">Front Desk</option>
              <option value="Kitchen">Kitchen</option>
              <option value="Housekeeping">Housekeeping</option>
              <option value="F&B Service">F&amp;B Service</option>
              <option value="Maintenance">Maintenance</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskDueDate">Due Date <span class="required">*</span></label>
            <input type="date" id="taskDueDate" required />
          </div>

          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="taskNotes">Notes</label>
          <textarea id="taskNotes" rows="3" placeholder="Any extra details for this task (optional)"></textarea>
        </div>

        <p class="form-error" id="formError"></p>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancelModalBtn">Cancel</button>
          <button type="submit" class="btn-primary">Add Task</button>
        </div>
      </form>
    </div>
  </div>

<script src="js/components.js"></script>
<script src="js/staff_manage.js"></script>
</body>
</html>
